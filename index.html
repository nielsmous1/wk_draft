<style>
:root {
  --bg: #0A1128;
  --bg2: #0F1A3D;
  --panel: #131F47;
  --panel2: #1A2856;
  --line: #263568;
  --grass: #00D46A;
  --grass-dim: #00A653;
  --gold: #FFB627;
  --red: #FF3B5C;
  --white: #F5F8FF;
  --text: #C3CDE8;
  --muted: #7A87AD;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; overflow-x: hidden; }
#root { min-height: 100vh; }
.cond { font-family: 'Barlow Condensed', sans-serif; }
.mono { font-family: 'JetBrains Mono', monospace; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--panel2); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 60% { transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes goalFlash { 0% { background: var(--grass); } 100% { background: transparent; } }
@keyframes trophySpin { 0% { transform: rotateY(0deg) scale(0.5); opacity: 0; } 100% { transform: rotateY(360deg) scale(1); opacity: 1; } }
@keyframes confetti { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}
</style>
</head>

function kanSpelenOp(spelerPosities, slot) {
  const compat = POSITIE_COMPAT[slot] || [slot];
  return spelerPosities.some(p => compat.includes(p));
}

// Poisson random (Knuth)
function poisson(lambda) {
  const L = Math.exp(-Math.max(0.05, lambda));
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

const ATTACK_POS = new Set(["ST","LW","RW","CAM"]);
const DEFENSE_POS = new Set(["GK","CB","LB","RB","LWB","RWB"]);
const MID_POS = new Set(["CM","CDM","RM","LM"]);

function berekenSterkte(teamNaam, customPlayers) {
  const players = customPlayers || SQUADS[teamNaam].players;
  const att = [], dfs = [], mid = [], all = [];
  for (const [naam, pos, r] of players) {
    all.push(r);
    if (pos.some(p => ATTACK_POS.has(p))) att.push(r);
    if (pos.some(p => DEFENSE_POS.has(p))) dfs.push(r);
    if (pos.some(p => MID_POS.has(p))) mid.push(r);
  }
  const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 78;
  return { attack: avg(att), defense: avg(dfs), mid: avg(mid), overall: avg(all) };
}

const BASE_RATE = 1.3, REF = 82.0;

function simuleerWedstrijd(sa, sb, knockout=false) {
  let lamA = BASE_RATE * Math.pow(sa.attack/REF, 1.5) * Math.pow(REF/sb.defense, 1.5) * (sa.mid/REF);
  let lamB = BASE_RATE * Math.pow(sb.attack/REF, 1.5) * Math.pow(REF/sa.defense, 1.5) * (sb.mid/REF);
  // Overall-sterkte laat sterker team vaker winnen. Knockout iets scherper dan groepsfase.
  const diff = sa.overall - sb.overall;
  const factor = knockout ? 0.032 : 0.026;
  const boost = Math.max(0.6, Math.min(1.6, 1.0 + diff * factor));
  lamA *= boost; lamB /= boost;
  let gA = poisson(lamA), gB = poisson(lamB);
  let extra = "", pens = null;
  if (knockout && gA === gB) {
    gA += poisson(lamA * 0.4); gB += poisson(lamB * 0.4);
    extra = "nv";
    if (gA === gB) { extra = "pen"; }
  }
  return { gA, gB, lamA, lamB, extra };
}

const SCORE_WEIGHT = {
  ST:3.5, LW:2.2, RW:2.2, CAM:1.8, CM:0.9, RM:1.1, LM:1.1,
  CDM:0.35, CB:0.2, LB:0.25, RB:0.25, LWB:0.4, RWB:0.4, GK:0.0,
};

function weightedChoice(items, weights) {
  const total = weights.reduce((a,b)=>a+b,0);
  if (total <= 0) return items[Math.floor(Math.random()*items.length)];
  let r = Math.random() * total;
  for (let i=0;i<items.length;i++){ r -= weights[i]; if (r<=0) return items[i]; }
  return items[items.length-1];
}

function genereerScorers(nGoals, spelers) {
  if (nGoals === 0) return [];
  const kand = [], gew = [];
  for (const item of spelers) {
    const naam = item[0], pos = item[1], rating = item[2];
    const w = (rating/82.0) * Math.max(...pos.map(p => SCORE_WEIGHT[p] ?? 0.5));
    if (w > 0) { kand.push(naam); gew.push(w); }
  }
  if (!kand.length) return [];
  const scorers = [];
  const minutes = [];
  for (let i=0;i<nGoals;i++){ scorers.push(weightedChoice(kand, gew)); minutes.push(1+Math.floor(Math.random()*95)); }
  minutes.sort((a,b)=>a-b);
  return scorers.map((s,i)=>({naam:s, min:minutes[i]}));
}

// Penalty logic
function penaltyVolgorde(spelers) {
  const PREF = {ST:1.5,CAM:1.4,CM:1.3,LW:1.2,RW:1.2,LM:1.1,RM:1.1,CDM:1.0,LB:0.8,RB:0.8,CB:0.7,LWB:0.8,RWB:0.8,GK:0.0};
  const gewogen = [];
  for (const item of spelers) {
    const naam = item[0], pos = item[1], rating = item[2];
    const w = (rating/82.0) * Math.max(...pos.map(p => PREF[p] ?? 0.5));
    if (w > 0) gewogen.push({naam, rating, w});
  }
  gewogen.sort((a,b)=>b.w-a.w);
  return gewogen.map(x=>({naam:x.naam, rating:x.rating}));
}

function penaltyKans(ratingSchutter, defRatingKeeper) {
  return Math.max(0.55, Math.min(0.91, 0.76 + (ratingSchutter-82)*0.007 - (defRatingKeeper-82)*0.003));
}

function simuleerStrafschoppen(sa, sb, spelersA, spelersB) {
  const volgordeA = spelersA ? penaltyVolgorde(spelersA) : Array(10).fill({naam:"Speler",rating:80});
  const volgordeB = spelersB ? penaltyVolgorde(spelersB) : Array(10).fill({naam:"Speler",rating:80});
  let scoreA = 0, scoreB = 0;
  const shots = [];
  for (let i=0;i<5;i++){
    const ka = volgordeA[i % volgordeA.length], kb = volgordeB[i % volgordeB.length];
    const doelA = Math.random() < penaltyKans(ka.rating, sb.defense);
    const doelB = Math.random() < penaltyKans(kb.rating, sa.defense);
    if (doelA) scoreA++; if (doelB) scoreB++;
    shots.push({ round:i+1, sd:false, a:{naam:ka.naam, goal:doelA}, b:{naam:kb.naam, goal:doelB}, scoreA, scoreB });
    const rest = 4 - i;
    if (scoreA > scoreB + rest || scoreB > scoreA + rest) break;
  }
  let sd = 0;
  while (scoreA === scoreB) {
    sd++;
    const ka = volgordeA[(5+sd-1) % volgordeA.length], kb = volgordeB[(5+sd-1) % volgordeB.length];
    const doelA = Math.random() < penaltyKans(ka.rating, sb.defense);
    const doelB = Math.random() < penaltyKans(kb.rating, sa.defense);
    if (doelA) scoreA++; if (doelB) scoreB++;
    shots.push({ round:sd, sd:true, a:{naam:ka.naam, goal:doelA}, b:{naam:kb.naam, goal:doelB}, scoreA, scoreB });
    if (scoreA !== scoreB) break;
  }
  return { shots, scoreA, scoreB, aWint: scoreA > scoreB };
}

// Draft weighting
function weegLanden() {
  const gew = {};
  for (const team in SQUADS) {
    const gem = SQUADS[team].players.reduce((a,[,,r])=>a+r,0)/11;
    gew[team] = Math.pow(Math.max(0.1, gem-65), 3);
  }
  return gew;
}

function trekLand(gewichten, exclude=new Set()) {
  const landen = Object.keys(gewichten).filter(l => !exclude.has(l));
  const kansen = landen.map(l => gewichten[l]);
  return weightedChoice(landen, kansen);
}

// Group stage nr-3 chance
const KANS_NR3 = {7:0.99,6:0.96,5:0.88,4:0.66,3:0.30,2:0.10,1:0.02,0:0.00};
function kansNr3(punten, gd) {
  const base = KANS_NR3[Math.min(punten,7)] ?? 0.97;
  const bonus = Math.min(0.05, Math.max(-0.05, gd*0.01));
  return Math.max(0, Math.min(1, base + bonus));
}

// Monte Carlo group probabilities
function berekenGroepskanssen(groep, n=1500) {
  const tellers = {};
  groep.forEach(l => tellers[l] = {p1:0,p2:0,p3:0,p4:0});
  const sterktes = {};
  groep.forEach(l => sterktes[l] = berekenSterkte(l));
  for (let iter=0; iter<n; iter++){
    const stand = {};
    groep.forEach(l => stand[l] = {pts:0,gd:0,gf:0});
    for (let i=0;i<groep.length;i++){
      for (let j=i+1;j<groep.length;j++){
        const a=groep[i], b=groep[j];
        const {gA,gB} = simuleerWedstrijd(sterktes[a], sterktes[b]);
        if (gA>gB) stand[a].pts+=3; else if (gB>gA) stand[b].pts+=3; else { stand[a].pts++; stand[b].pts++; }
        stand[a].gd+=gA-gB; stand[b].gd+=gB-gA; stand[a].gf+=gA; stand[b].gf+=gB;
      }
    }
    const gerankt = [...groep].sort((x,y) =>
      (stand[y].pts-stand[x].pts) || (stand[y].gd-stand[x].gd) || (stand[y].gf-stand[x].gf) || (sterktes[y].overall-sterktes[x].overall));
    gerankt.forEach((l,i) => tellers[l][`p${i+1}`]++);
  }
  const res = {};
  groep.forEach(l => { res[l] = {}; for (const k in tellers[l]) res[l][k] = tellers[l][k]/n; });
  return res;
}

let GROEP_KANSSEN = null;
function ensureGroepskanssen() {
  if (GROEP_KANSSEN) return GROEP_KANSSEN;
  GROEP_KANSSEN = {};
  for (const letter in WK2026_GROEPEN) {
    GROEP_KANSSEN[letter] = berekenGroepskanssen(WK2026_GROEPEN[letter]);
  }
  return GROEP_KANSSEN;
}

const TOPLAND_DREMPEL = 85.0;  // gem. teamrating; hierboven = "topland"
function isTopland(l) {
  return (SQUADS[l].players.reduce((a,[,,r])=>a+r,0)/11) >= TOPLAND_DREMPEL;
}

function trekPoulegenoten() {
  const gew = {};
  for (const l in SQUADS) {
    const gem = SQUADS[l].players.reduce((a,[,,r])=>a+r,0)/11;
    gew[l] = Math.pow(gem, 1.5);
  }
  const sel = [];
  while (sel.length < 3) {
    const alTopland = sel.some(isTopland);
    // Max. één topland onder je tegenstanders: sluit toplanden uit zodra er al één is geloot.
    const kand = Object.keys(gew).filter(l => !sel.includes(l) && !(alTopland && isTopland(l)));
    const kansen = kand.map(l => gew[l]);
    sel.push(weightedChoice(kand, kansen));
  }
  return sel;
}

function bouwBracket(onzePos, onzePoulegenoten) {
  ensureGroepskanssen();
  const alGesel = new Set([...onzePoulegenoten, "Wij"]);
  const nr1s = [], nr2s = [], nr3sAll = [];
  for (const letter in WK2026_GROEPEN) {
    const landen = WK2026_GROEPEN[letter];
    const kansen = GROEP_KANSSEN[letter];
    let besch = landen.filter(l => !alGesel.has(l));
    if (!besch.length) continue;
    let g1 = besch.map(l => Math.pow(kansen[l].p1, 2));
    if (g1.reduce((a,b)=>a+b,0) > 0) {
      const nr1 = weightedChoice(besch, g1);
      nr1s.push(nr1); alGesel.add(nr1); besch = besch.filter(l => l!==nr1);
    }
    let besch2 = besch.filter(l => !alGesel.has(l));
    if (besch2.length) {
      let g2 = besch2.map(l => Math.pow(kansen[l].p2, 2));
      if (g2.reduce((a,b)=>a+b,0) > 0) {
        const nr2 = weightedChoice(besch2, g2);
        nr2s.push(nr2); alGesel.add(nr2);
      }
    }
    for (const l of landen) if (!alGesel.has(l)) nr3sAll.push([l, kansen[l].p3]);
  }
  const getrokkenNr3 = [];
  for (let i=0;i<8;i++){
    const kand = nr3sAll.filter(([l]) => !alGesel.has(l));
    if (!kand.length) break;
    const l3 = kand.map(x=>x[0]), k3 = kand.map(x=>x[1]);
    if (k3.reduce((a,b)=>a+b,0) <= 0) break;
    const g = weightedChoice(l3, k3);
    getrokkenNr3.push(g); alGesel.add(g);
  }
  let bracket = [["Wij", `#${onzePos}`]];
  nr1s.slice(0,11).forEach(l => bracket.push([l,"#1"]));
  nr2s.slice(0,12).forEach(l => bracket.push([l,"#2"]));
  getrokkenNr3.slice(0,8).forEach(l => bracket.push([l,"#3"]));
  const rest = bracket.slice(1);
  for (let i=rest.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [rest[i],rest[j]]=[rest[j],rest[i]]; }
  return [bracket[0], ...rest];
}

// ═══════════════════════════════════════════════════════════════════
// GEDEELD SCOREBORD (JSONBin.io)
// ═══════════════════════════════════════════════════════════════════
//
// De instellingen (bin-ID + key) staan NIET in dit bestand, maar in een
// apart bestandje "config.js" ernaast. Zo kun je dit HTML-bestand vrij
// vervangen door een nieuwe versie zonder je key opnieuw in te vullen.
// Zie config.js voor de uitleg. Ontbreekt config.js? Dan draait het
// scorebord automatisch lokaal (alleen zichtbaar in je eigen browser).
const SCOREBORD_CONFIG = (typeof window !== "undefined" && window.WK_CONFIG)
  ? window.WK_CONFIG
  : { MODE: "local", BIN_ID: "", API_KEY: "" };

const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";

function jsonbinKlaar() {
  return SCOREBORD_CONFIG.MODE === "jsonbin"
    && SCOREBORD_CONFIG.BIN_ID && !SCOREBORD_CONFIG.BIN_ID.startsWith("VUL_")
    && SCOREBORD_CONFIG.API_KEY && !SCOREBORD_CONFIG.API_KEY.startsWith("VUL_");
}

// --- JSONBin: hele ranglijst is één array in de bin ---
async function jsonbinLees() {
  const res = await fetch(`${JSONBIN_BASE}/${SCOREBORD_CONFIG.BIN_ID}/latest`, {
    method: "GET",
    headers: { "X-Access-Key": SCOREBORD_CONFIG.API_KEY, "X-Bin-Meta": "false" },
  });
  if (!res.ok) throw new Error(`JSONBin lees-fout ${res.status}`);
  const data = await res.json();
  // Body kan zijn: kale array, {spelers:[...]}, of (met meta) {record:...}
  let inner = data;
  if (inner && !Array.isArray(inner) && inner.record !== undefined) inner = inner.record;
  if (inner && !Array.isArray(inner) && Array.isArray(inner.spelers)) inner = inner.spelers;
  return Array.isArray(inner) ? inner : [];
}

async function jsonbinSchrijf(spelers) {
  const res = await fetch(`${JSONBIN_BASE}/${SCOREBORD_CONFIG.BIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Access-Key": SCOREBORD_CONFIG.API_KEY },
    body: JSON.stringify({ spelers }),
  });
  if (!res.ok) throw new Error(`JSONBin schrijf-fout ${res.status}`);
  return true;
}

// --- Lokale fallback (per browser) ---
function localLees() {
  try { return JSON.parse(localStorage.getItem("wk_scorebord") || "[]"); }
  catch(e) { return []; }
}
function localSchrijf(spelers) {
  try { localStorage.setItem("wk_scorebord", JSON.stringify(spelers)); } catch(e) {}
}

function voegResultaatToe(spelers, naam, teamRating, goals, isChampion) {
  const sleutel = naam.toLowerCase().trim();
  let p = spelers.find(x => (x.naam || "").toLowerCase().trim() === sleutel);
  if (!p) { p = { naam, games:0, totalRating:0, goals:0, championships:0 }; spelers.push(p); }
  p.games += 1;
  p.totalRating += teamRating;
  p.goals += goals;
  if (isChampion) p.championships += 1;
  p.naam = naam;
  return p;
}

async function saveResult(naam, teamRating, goals, isChampion) {
  // JSONBin: lees hele lijst, werk speler bij, schrijf terug
  if (jsonbinKlaar()) {
    try {
      const spelers = await jsonbinLees();
      const p = voegResultaatToe(spelers, naam, teamRating, goals, isChampion);
      await jsonbinSchrijf(spelers);
      return p;
    } catch(e) {
      console.error("JSONBin opslaan mislukt, val terug op lokaal:", e);
      // val door naar lokaal zodat de score niet verloren gaat
    }
  }
  // Lokaal
  try {
    const spelers = localLees();
    const p = voegResultaatToe(spelers, naam, teamRating, goals, isChampion);
    localSchrijf(spelers);
    return p;
  } catch(e) { console.error("lokaal opslaan mislukt", e); return null; }
}

async function loadScoreboard() {
  if (jsonbinKlaar()) {
    try { return await jsonbinLees(); }
    catch(e) { console.error("JSONBin laden mislukt, val terug op lokaal:", e); }
  }
  return localLees();
}

// SCREEN: DRAFT
// ═══════════════════════════════════════════════════════════════════
function DraftScreen({ formation, onComplete }) {
  const slots = FORMATIES[formation];
  const [gevuld, setGevuld] = useState(Array(slots.length).fill(null));
  const [skips, setSkips] = useState(3);
  const [currentLand, setCurrentLand] = useState(null);
  const [beschikbaar, setBeschikbaar] = useState([]);
  const [posKeuze, setPosKeuze] = useState(null); // {speler, slots:[idx,...]}
  const gewichten = useMemo(() => weegLanden(), []);

  // Track which player names are already picked (per country: "Land::Naam")
  function gekozenKey(land, naam) { return `${land}::${naam}`; }
  function gekozenSet(g) {
    const s = new Set();
    g.forEach(p => { if (p) s.add(gekozenKey(p.land, p.naam)); });
    return s;
  }

  function beschikbareSpelers(land, openSlotIdxs, gekozen) {
    const besch = [];
    for (const [naam, posities, rating] of SQUADS[land].players) {
      if (gekozen.has(gekozenKey(land, naam))) continue; // al gekozen → uitsluiten
      const passend = openSlotIdxs.filter(i => kanSpelenOp(posities, slots[i].pos));
      if (passend.length) besch.push({ naam, posities, rating, passend });
    }
    return besch;
  }

  function trekNieuwLandVoor(g) {
    const openIdxs = g.map((v,i)=>v===null?i:-1).filter(i=>i>=0);
    if (openIdxs.length === 0) return;
    const gekozen = gekozenSet(g);
    let tries = 0;
    while (tries < 300) {
      tries++;
      const land = trekLand(gewichten);
      const besch = beschikbareSpelers(land, openIdxs, gekozen);
      if (besch.length) { setCurrentLand(land); setBeschikbaar(besch); return; }
    }
  }

  useEffect(() => { trekNieuwLandVoor(gevuld); }, []);

  function kiesSpeler(sp) {
    if (sp.passend.length === 1) {
      plaats(sp, sp.passend[0]);
    } else {
      setPosKeuze({ speler: sp, slots: sp.passend });
    }
  }

  function plaats(sp, slotIdx) {
    const ng = [...gevuld];
    ng[slotIdx] = { naam: sp.naam, posities: sp.posities, rating: sp.rating, land: currentLand };
    setGevuld(ng);
    setPosKeuze(null);
    if (ng.every(x => x !== null)) {
      setTimeout(() => onComplete(ng), 400);
    } else {
      setTimeout(() => trekNieuwLandVoor(ng), 120);
    }
  }

  function doSkip() {
    if (skips <= 0) return;
    setSkips(skips - 1);
    setPosKeuze(null);
    trekNieuwLandVoor(gevuld);
  }

  const nGevuld = gevuld.filter(x=>x!==null).length;
  const progress = (nGevuld / slots.length) * 100;

  return (
    <div style={{maxWidth:1060, margin:"0 auto", padding:"32px 20px 60px"}}>
      {/* Progress header */}
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
        <div className="mono" style={{color:"var(--grass)", fontSize:12, fontWeight:700, letterSpacing:"0.2em"}}>
          PICK {Math.min(nGevuld+1, slots.length)} / {slots.length}
        </div>
        <div className="mono" style={{fontSize:12, color: skips>0?"var(--gold)":"var(--muted)", fontWeight:700}}>
          {skips} SKIP{skips!==1?"S":""} OVER
        </div>
      </div>
      <div style={{height:5, background:"var(--panel)", borderRadius:3, overflow:"hidden", marginBottom:28}}>
        <div style={{height:"100%", width:`${progress}%`, background:"var(--grass)", transition:"width 0.4s ease", borderRadius:3}}/>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"minmax(0, 1fr) minmax(300px, 380px)", gap:24, alignItems:"start"}}>
        {/* LEFT: country + players OR position picker */}
        <div>
          {currentLand && !posKeuze && (
            <div key={currentLand} style={{animation:"popIn 0.35s ease"}}>
              <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:18}}>
                <Flag team={currentLand} size={40}/>
                <div>
                  <div className="mono" style={{fontSize:11, color:"var(--muted)", letterSpacing:"0.2em", fontWeight:700}}>JOUW LAND</div>
                  <div className="cond" style={{fontSize:32, fontWeight:800, color:"var(--white)", lineHeight:1}}>{currentLand}</div>
                </div>
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(250px, 1fr))", gap:10}}>
                {beschikbaar.map((sp,i)=>(
                  <PlayerPick key={sp.naam} sp={sp} onClick={()=>kiesSpeler(sp)} delay={i*0.03}/>
                ))}
              </div>
              {skips > 0 && (
                <div style={{marginTop:20}}>
                  <button onClick={doSkip} className="cond" style={{
                    background:"transparent", border:"1.5px solid var(--line)", color:"var(--muted)",
                    padding:"9px 22px", borderRadius:8, cursor:"pointer", fontSize:15, fontWeight:700,
                    textTransform:"uppercase", letterSpacing:"0.05em", transition:"all 0.15s"}}
                    onMouseEnter={e=>{e.target.style.borderColor="var(--gold)"; e.target.style.color="var(--gold)";}}
                    onMouseLeave={e=>{e.target.style.borderColor="var(--line)"; e.target.style.color="var(--muted)";}}>
                    ⏭ Land overslaan ({skips})
                  </button>
                </div>
              )}
            </div>
          )}

          {posKeuze && (
            <div style={{animation:"popIn 0.3s ease"}}>
              <div className="cond" style={{fontSize:26, fontWeight:800, color:"var(--white)", marginBottom:4}}>
                Waar zet je {posKeuze.speler.naam}?
              </div>
              <div style={{color:"var(--text)", marginBottom:18, fontSize:15}}>
                Klik op een groene positie in je opstelling.
              </div>
              <SelectablePitch formation={formation} gevuld={gevuld}
                highlightSlots={posKeuze.slots} onPickSlot={(idx)=>plaats(posKeuze.speler, idx)}/>
              <div style={{marginTop:14, textAlign:"center"}}>
                <button onClick={()=>setPosKeuze(null)} className="cond" style={{
                  background:"transparent", border:"none", color:"var(--muted)", cursor:"pointer",
                  fontSize:14, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.05em"}}>
                  ← Andere speler kiezen
                </button>
              </div>
            </div>
          )}
        </div>

        {/* RIGHT: live squad as pitch */}
        <div style={{background:"var(--bg2)", border:"1px solid var(--line)", borderRadius:14, padding:"16px"}}>
          <div className="mono" style={{fontSize:11, color:"var(--muted)", letterSpacing:"0.2em", fontWeight:700, marginBottom:12}}>
            JOUW ELFTAL · {formation}
          </div>
          <SelectablePitch formation={formation} gevuld={gevuld} highlightSlots={[]} onPickSlot={null} compact/>
        </div>
      </div>
    </div>
  );
}

// Pitch that can render filled players and optionally highlight/select empty slots
function SelectablePitch({ formation, gevuld, highlightSlots, onPickSlot, compact }) {
  const slots = FORMATIES[formation];
  const hs = new Set(highlightSlots || []);
  return (
    <div style={{position:"relative", width:"100%", aspectRatio: compact ? "3/4" : "4/5",
      background:"linear-gradient(180deg, #0C3D22 0%, #08301A 100%)", borderRadius:12,
      border:"1px solid rgba(0,212,106,0.2)", overflow:"hidden"}}>
      {/* pitch markings */}
      <div style={{position:"absolute", left:0, right:0, top:"50%", height:1, background:"rgba(255,255,255,0.1)"}}/>
      <div style={{position:"absolute", left:"50%", top:"50%", transform:"translate(-50%,-50%)",
        width:"22%", aspectRatio:"1", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"50%"}}/>
      <div style={{position:"absolute", left:"28%", right:"28%", bottom:0, height:"14%", border:"1px solid rgba(255,255,255,0.1)", borderBottom:"none"}}/>
      <div style={{position:"absolute", left:"28%", right:"28%", top:0, height:"14%", border:"1px solid rgba(255,255,255,0.1)", borderTop:"none"}}/>

      {slots.map((s,i)=>{
        const p = gevuld[i];
        const isHi = hs.has(i);
        const clickable = isHi && onPickSlot;
        return (
          <PitchSlot key={i} slot={s} player={p} highlight={isHi} compact={compact}
            onClick={clickable ? ()=>onPickSlot(i) : null}/>
        );
      })}
    </div>
  );
}

function PitchSlot({ slot, player, highlight, onClick, compact }) {
  const [hover, setHover] = useState(false);
  const size = compact ? 34 : 42;
  const filled = !!player;
  const bg = highlight ? "var(--grass)" : filled
    ? (player.rating>=88?"var(--gold)":player.rating>=83?"var(--grass)":"var(--panel2)")
    : "rgba(19,31,71,0.7)";
  const border = highlight ? "var(--grass)" : filled
    ? (player.rating>=88?"var(--gold)":player.rating>=83?"var(--grass)":"var(--line)")
    : "rgba(122,135,173,0.4)";
  return (
    <div style={{position:"absolute", left:`${slot.x}%`, top:`${slot.y}%`, transform:"translate(-50%,-50%)",
      display:"flex", flexDirection:"column", alignItems:"center", gap:2,
      cursor: onClick?"pointer":"default", zIndex: highlight?5:1}}
      onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      <div className="cond" style={{
        width:size, height:size, minWidth:size, borderRadius:"50%",
        background: hover&&onClick ? "var(--white)" : bg,
        border:`2px solid ${border}`,
        display:"flex", alignItems:"center", justifyContent:"center",
        fontSize: compact?14:17, fontWeight:900,
        color: filled ? (player.rating>=83?"#03260F":"var(--white)") : (highlight?"#03260F":"var(--muted)"),
        boxShadow: highlight?"0 0 0 4px rgba(0,212,106,0.25)":"none",
        animation: highlight?"pulse 1.4s infinite":"none",
        transition:"all 0.15s"}}>
        {filled ? player.rating : (highlight ? "+" : slot.pos)}
      </div>
      {filled && !compact && (
        <div style={{fontSize:10, fontWeight:600, color:"var(--white)", textAlign:"center", lineHeight:1.1,
          maxWidth:64, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
          textShadow:"0 1px 3px rgba(0,0,0,0.8)"}}>
          {player.naam.split(' ').slice(-1)[0]}
        </div>
      )}
      {filled && (
        <div style={{fontSize: compact?9:10, display:"flex", alignItems:"center", gap:3, maxWidth: compact?58:72,
          whiteSpace:"nowrap", overflow:"hidden", textShadow:"0 1px 3px rgba(0,0,0,0.8)"}}>
          {compact && (
            <span style={{fontWeight:600, color:"var(--white)", overflow:"hidden", textOverflow:"ellipsis"}}>
              {player.naam.split(' ').slice(-1)[0]}
            </span>
          )}
          <span>{flagOf(player.land)}</span>
        </div>
      )}
      {!filled && (
        <div className="mono" style={{fontSize:9, fontWeight:700, color: highlight?"var(--grass)":"var(--muted)",
          textShadow:"0 1px 2px rgba(0,0,0,0.6)"}}>{slot.pos}</div>
      )}
    </div>
  );
}

function PitchView({ gevuld, slots, formation }) {
  const rows = { GK:[], DEF:[], MID:[], ATT:[] };
  slots.forEach((s,i) => {
    const p = gevuld[i];
    const entry = { ...p, slot:s.pos };
    if (s.pos==="GK") rows.GK.push(entry);
    else if (DEFENSE_POS.has(s.pos)) rows.DEF.push(entry);
    else if (ATTACK_POS.has(s.pos)) rows.ATT.push(entry);
    else rows.MID.push(entry);
  });
  const rowOrder = ["ATT","MID","DEF","GK"];
  return (
    <div style={{display:"flex", flexDirection:"column", gap:22}}>
      {rowOrder.map(rk => (
        <div key={rk} style={{display:"flex", justifyContent:"space-around", gap:10, flexWrap:"wrap"}}>
          {rows[rk].map((p,i)=>(
            <PitchPlayer key={i} p={p} delay={i*0.05}/>
          ))}
        </div>
      ))}
    </div>
  );
}

  return (
    <div style={{animation:"popIn 0.4s ease", background: isOurs?"var(--panel)":"var(--bg2)",
      border:`1.5px solid ${highlight ? (homeWin?"var(--grass)":"var(--red)") : "var(--line)"}`,
      borderRadius:12, overflow:"hidden", marginBottom:10}}>
      <div style={{display:"flex", alignItems:"stretch"}}>
        {/* Home */}
        <div style={{flex:1, display:"flex", alignItems:"center", gap:10, padding:"14px 16px", justifyContent:"flex-end", textAlign:"right"}}>
          <div>
            <div className="cond" style={{fontSize:20, fontWeight:700, color: homeWin?"var(--white)":"var(--text)", lineHeight:1}}>
              {homeNaam === "Jij" ? "JIJ" : homeNaam}
            </div>
          </div>
          <Flag team={homeNaam==="Jij"?"You FC":homeNaam} size={28}/>

        {/* Score */}
        <div style={{display:"flex", alignItems:"center", gap:10, padding:"0 18px", background:"var(--bg)", minWidth:110, justifyContent:"center"}}>
          <span className="cond" style={{fontSize:34, fontWeight:900, color: homeWin?"var(--grass)":"var(--white)"}}>{gA}</span>
          <span className="cond" style={{fontSize:20, color:"var(--muted)", fontWeight:600}}>–</span>
          <span className="cond" style={{fontSize:34, fontWeight:900, color: !homeWin?"var(--grass)":"var(--white)"}}>{gB}</span>
        </div>
        {/* Away */}
        <div style={{flex:1, display:"flex", alignItems:"center", gap:10, padding:"14px 16px"}}>
          <Flag team={awayNaam==="Jij"?"You FC":awayNaam} size={28}/>
          <div className="cond" style={{fontSize:20, fontWeight:700, color: !homeWin?"var(--white)":"var(--text)", lineHeight:1}}>

        </div>

        <div className="mono" style={{textAlign:"center", fontSize:10, color:"var(--gold)", padding:"2px 0 6px", letterSpacing:"0.1em", fontWeight:700}}>
          {extra==="nv" ? "NA VERLENGING" : extra==="pen" ? `NA STRAFSCHOPPEN ${penaltyResult||""}` : ""}

            {scorersB?.map((s,i)=><ScorerLine key={i} s={s} align="left"/>)}
          </div>
        </div>
      )}
    </div>
  );
}

function ScorerLine({ s, align }) {

    <div style={{fontSize:12, color:"var(--text)", display:"flex", gap:6, justifyContent: align==="right"?"flex-end":"flex-start", alignItems:"center", marginBottom:2}}>
      {align==="left" && <span style={{color:"var(--grass)"}}>⚽</span>}

}

// SCREEN: GROUP STAGE
// ═══════════════════════════════════════════════════════════════════
function GroupStage({ onzeSpelers, onzeSterkte, onComplete }) {
  const [poulegenoten] = useState(() => trekPoulegenoten());
  const [phase, setPhase] = useState("intro"); // intro | results
  const [data, setData] = useState(null);

  function simuleer() {
    const sterktesPoel = {};
    poulegenoten.forEach(n => sterktesPoel[n] = berekenSterkte(n));
    const stand = { "Wij": {pts:0,gd:0,gf:0} };
    poulegenoten.forEach(n => stand[n] = {pts:0,gd:0,gf:0});
    const onzeWedstrijden = [];
    const spelersPeng = onzeSpelers.map(p => [p.naam, p.posities, p.rating]);

    for (const teg of poulegenoten) {
      const { gA, gB } = simuleerWedstrijd(onzeSterkte, sterktesPoel[teg]);
      if (gA>gB) stand["Wij"].pts+=3; else if (gB>gA) stand[teg].pts+=3; else { stand["Wij"].pts++; stand[teg].pts++; }
      stand["Wij"].gd+=gA-gB; stand[teg].gd+=gB-gA; stand["Wij"].gf+=gA; stand[teg].gf+=gB;
      onzeWedstrijden.push({
        teg, gA, gB,
        scorersA: genereerScorers(gA, spelersPeng),
        scorersB: genereerScorers(gB, SQUADS[teg].players),
      });
    }
    // Onderlinge
    for (let i=0;i<poulegenoten.length;i++){
      for (let j=i+1;j<poulegenoten.length;j++){
        const a=poulegenoten[i], b=poulegenoten[j];
        const { gA, gB } = simuleerWedstrijd(sterktesPoel[a], sterktesPoel[b]);
        if (gA>gB) stand[a].pts+=3; else if (gB>gA) stand[b].pts+=3; else { stand[a].pts++; stand[b].pts++; }
        stand[a].gd+=gA-gB; stand[b].gd+=gB-gA; stand[a].gf+=gA; stand[b].gf+=gB;
      }
    }
    const alle = ["Wij", ...poulegenoten];
    const sterktesAll = {...sterktesPoel, "Wij": onzeSterkte};
    const gerankt = alle.sort((x,y) =>
      (stand[y].pts-stand[x].pts) || (stand[y].gd-stand[x].gd) || (stand[y].gf-stand[x].gf) || (sterktesAll[y].overall-sterktesAll[x].overall));
    const onzePos = gerankt.indexOf("Wij") + 1;
    const pts = stand["Wij"].pts, gd = stand["Wij"].gd;
    const ourGoals = stand["Wij"].gf;

    let gekwal = true, kans = null, doorAls3 = null;
    if (onzePos <= 2) gekwal = true;
    else if (onzePos === 3) { kans = kansNr3(pts, gd); doorAls3 = Math.random() < kans; gekwal = doorAls3; }
    else gekwal = false;

    setData({ onzeWedstrijden, stand, gerankt, onzePos, pts, gd, gekwal, kans, doorAls3, ourGoals });
    setPhase("results");
  }

  if (phase === "intro") {
    return (
      <div style={{maxWidth:640, margin:"0 auto", padding:"48px 20px", animation:"fadeUp 0.5s ease"}}>
        <div className="mono" style={{color:"var(--grass)", fontSize:12, fontWeight:700, letterSpacing:"0.3em", marginBottom:10}}>GROEPSFASE</div>
        <h2 className="cond" style={{fontSize:40, fontWeight:900, color:"var(--white)", marginBottom:8}}>Jouw poule</h2>
        <p style={{color:"var(--text)", marginBottom:28, fontSize:16}}>Je speelt tegen deze drie landen. Word 1e of 2e om zeker door te gaan — als 3e hangt het van je punten af.</p>
        <div style={{display:"flex", flexDirection:"column", gap:10, marginBottom:32}}>
          {poulegenoten.map((teg,i)=>(
            <div key={teg} style={{display:"flex", alignItems:"center", gap:14, padding:"16px 18px",
              background:"var(--panel)", border:"1px solid var(--line)", borderRadius:12, animation:`slideInLeft 0.4s ease ${i*0.1}s both`}}>
              <div className="mono" style={{fontSize:12, color:"var(--muted)", fontWeight:700}}>W{i+1}</div>
              <Flag team={teg} size={32}/>
              <div className="cond" style={{fontSize:24, fontWeight:700, color:"var(--white)", flex:1}}>{teg}</div>
              <div className="cond" style={{fontSize:18, fontWeight:700, color:"var(--muted)"}}>{berekenSterkte(teg).overall.toFixed(0)}</div>
            </div>
          ))}
        </div>
        <div style={{textAlign:"center"}}><Btn onClick={simuleer}>Speel de wedstrijden</Btn></div>
      </div>
    );
  }

  return (
    <div style={{maxWidth:720, margin:"0 auto", padding:"36px 20px 60px", animation:"fadeIn 0.4s ease"}}>
      <div className="mono" style={{color:"var(--grass)", fontSize:12, fontWeight:700, letterSpacing:"0.3em", marginBottom:16}}>GROEPSFASE · UITSLAGEN</div>
      {data.onzeWedstrijden.map((w,i)=>(
        <ScoreCard key={i} homeNaam="Jij" awayNaam={w.teg} gA={w.gA} gB={w.gB}
          scorersA={w.scorersA} scorersB={w.scorersB} isOurs highlight/>
      ))}

      {/* Standings */}
      <div style={{background:"var(--bg2)", border:"1px solid var(--line)", borderRadius:12, padding:"18px", marginTop:20, marginBottom:24}}>
        <div className="mono" style={{fontSize:11, color:"var(--muted)", letterSpacing:"0.2em", fontWeight:700, marginBottom:14}}>EINDSTAND</div>
        {data.gerankt.map((team,i)=>{
          const s = data.stand[team]; const isUs = team==="Wij";
          return (
            <div key={team} style={{display:"flex", alignItems:"center", gap:12, padding:"9px 8px",
              borderBottom: i<3?"1px solid var(--line)":"none",
              background: isUs?"rgba(0,212,106,0.08)":"transparent", borderRadius:6}}>
              <div className="cond" style={{fontSize:18, fontWeight:800, width:20, color: i<2?"var(--grass)":i===2?"var(--gold)":"var(--muted)"}}>{i+1}</div>
              <Flag team={isUs?"You FC":team} size={22}/>
              <div className="cond" style={{fontSize:18, fontWeight:700, flex:1, color: isUs?"var(--white)":"var(--text)"}}>{isUs?"JIJ":team}</div>
              <div className="mono" style={{fontSize:12, color:"var(--muted)"}}>{s.gd>=0?"+":""}{s.gd}</div>
              <div className="cond" style={{fontSize:20, fontWeight:800, color:"var(--white)", width:28, textAlign:"right"}}>{s.pts}</div>
            </div>
          );
        })}
      </div>

      {/* Qualification verdict */}
      <QualVerdict data={data} onComplete={()=>onComplete(data.onzePos, data.gekwal, poulegenoten, data.ourGoals)}/>
    </div>
  );
}

function QualVerdict({ data, onComplete }) {
  const { onzePos, gekwal, kans, pts, gd } = data;
  let msg, sub, color;
  if (onzePos <= 2) {
    color = "var(--grass)";
    msg = onzePos === 1 ? "Groepswinnaar" : "Door als runner-up";
    sub = "Je bent geplaatst voor de knock-outfase.";
  } else if (onzePos === 3 && gekwal) {
    color = "var(--grass)";
    msg = "Door als beste nr. 3";
    sub = `Met ${pts} punten (saldo ${gd>=0?"+":""}${gd}) — kans was ${Math.round(kans*100)}%.`;
  } else if (onzePos === 3) {
    color = "var(--red)";
    msg = "Uitgeschakeld";
    sub = `Als 3e met ${pts} punten net niet genoeg — kans was ${Math.round(kans*100)}%.`;
  } else {
    color = "var(--red)";
    msg = "Uitgeschakeld";
    sub = "Als 4e lig je eruit.";
  }
  return (
    <div style={{textAlign:"center", padding:"24px", background:"var(--panel)", borderRadius:14, border:`1.5px solid ${color}`, animation:"popIn 0.5s ease"}}>
      <div className="cond" style={{fontSize:34, fontWeight:900, color, marginBottom:6}}>{msg}</div>
      <div style={{color:"var(--text)", fontSize:15, marginBottom:20}}>{sub}</div>
      <Btn onClick={onComplete} variant={gekwal?"primary":"ghost"}>
        {gekwal ? "Naar de knock-out →" : "Bekijk eindresultaat"}
      </Btn>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SCREEN: KNOCKOUT
// ═══════════════════════════════════════════════════════════════════
function Knockout({ onzeSpelers, onzeSterkte, onzePos, poulegenoten, onFinish, addGoals }) {
  const [bracket] = useState(() => bouwBracket(onzePos, poulegenoten));
  const [teams, setTeams] = useState(() => {
    let t = bracket.map(([team]) => team);
    while (t.length % 2 !== 0) t.push("Bye");
    if (!t.includes("Wij")) t[0] = "Wij";
    return t;
  });
  const [rondeNr, setRondeNr] = useState(0);
  const [wijDoor, setWijDoor] = useState(true);
  const [phase, setPhase] = useState("matchups"); // matchups | penalties | results
  const [paren, setParen] = useState(null);
  const [rondeResults, setRondeResults] = useState(null);
  const [pendingPenalty, setPendingPenalty] = useState(null);
  const [uitschakelRonde, setUitschakelRonde] = useState(null);
  const spelersPeng = useMemo(() => onzeSpelers.map(p => [p.naam, p.posities, p.rating]), [onzeSpelers]);

  function sterkteVan(t) {
    if (t === "Wij") return onzeSterkte;
    return SQUADS[t] ? berekenSterkte(t) : berekenSterkte("Qatar");
  }

  function maakParen() {
    let p;
    if (wijDoor) {
      const nietWij = teams.filter(t => t !== "Wij");
      for (let i=nietWij.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [nietWij[i],nietWij[j]]=[nietWij[j],nietWij[i]]; }
      p = [["Wij", nietWij[0]]];
      for (let i=1;i<nietWij.length;i+=2) p.push([nietWij[i], nietWij[i+1] ?? "Bye"]);
    } else {
      const shuf = [...teams];
      for (let i=shuf.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuf[i],shuf[j]]=[shuf[j],shuf[i]]; }
      p = [];
      for (let i=0;i<shuf.length;i+=2) p.push([shuf[i], shuf[i+1] ?? "Bye"]);
    }
    setParen(p);
    setPhase("matchups");
  }

  useEffect(() => { maakParen(); }, [rondeNr]);

  function speelRonde() {
    // Simulate all pairs. If our match ends in penalties, pause for shootout.
    const results = [];
    let ourPenalty = null;
    let nieuwDoor = wijDoor;
    let uitRonde = uitschakelRonde;

    for (const [a,b] of paren) {
      if (b === "Bye") { results.push({ a, b, bye:true, winnaar:a }); continue; }
      const isOurs = (a==="Wij" || b==="Wij");
      const { gA, gB, extra } = simuleerWedstrijd(sterkteVan(a), sterkteVan(b), true);
      let winnaar, penData = null;

      if (extra === "pen") {
        // Penalty shootout
        const teg = a==="Wij" ? b : a;
        const spA = a==="Wij" ? spelersPeng : (SQUADS[a]?.players || []);
        const spB = b==="Wij" ? spelersPeng : (SQUADS[b]?.players || []);
        const pen = simuleerStrafschoppen(sterkteVan(a), sterkteVan(b), spA, spB);
        winnaar = pen.aWint ? a : b;
        penData = pen;
        if (isOurs) {
          // Store to show shootout screen
          ourPenalty = { a, b, gA, gB, pen, teg };
        }
      } else {
        winnaar = gA > gB ? a : b;
      }

      const scorersA = isOurs && a==="Wij" ? genereerScorers(gA, spelersPeng) : (SQUADS[a] ? genereerScorers(gA, SQUADS[a].players) : []);
      const scorersB = isOurs && b==="Wij" ? genereerScorers(gB, spelersPeng) : (SQUADS[b] ? genereerScorers(gB, SQUADS[b].players) : []);

      results.push({ a, b, gA, gB, extra, winnaar, penData, isOurs, scorersA, scorersB });

      if (isOurs) {
        addGoals(a==="Wij" ? gA : gB);
        if (winnaar !== "Wij") { nieuwDoor = false; uitRonde = RONDES[rondeNr]; }
      }
    }

    if (ourPenalty) {
      // Show penalty screen first, then reveal results
      setPendingPenalty({ penalty: ourPenalty, results, nieuwDoor, uitRonde });
      setPhase("penalties");
    } else {
      finishRonde(results, nieuwDoor, uitRonde);
    }
  }

  function finishRonde(results, nieuwDoor, uitRonde) {
    setRondeResults(results);
    setWijDoor(nieuwDoor);
    if (uitRonde && !uitschakelRonde) setUitschakelRonde(uitRonde);
    setPhase("results");
  }

  function afterPenalty() {
    const { results, nieuwDoor, uitRonde } = pendingPenalty;
    setPendingPenalty(null);
    finishRonde(results, nieuwDoor, uitRonde);
  }

  function volgendeRonde() {
    const winnaars = rondeResults.map(r => r.winnaar);
    if (winnaars.length === 1) {
      // Tournament over
      onFinish(winnaars[0], uitschakelRonde);
      return;
    }
    setTeams(winnaars);
    setRondeResults(null);
    setRondeNr(rondeNr + 1);
  }

  const rondeNaam = RONDES[rondeNr] || `Ronde ${rondeNr+1}`;

  // PENALTY SHOOTOUT SCREEN
  if (phase === "penalties" && pendingPenalty) {
    return <PenaltyShootout data={pendingPenalty.penalty} onDone={afterPenalty}/>;
  }

  // MATCHUPS SCREEN
  if (phase === "matchups" && paren) {
    const ourMatch = paren.find(([a,b]) => a==="Wij" || b==="Wij");
    const ourTeg = ourMatch ? (ourMatch[0]==="Wij" ? ourMatch[1] : ourMatch[0]) : null;
    return (
      <div style={{maxWidth:720, margin:"0 auto", padding:"36px 20px 60px", animation:"fadeUp 0.5s ease"}}>
        <div className="mono" style={{color:"var(--grass)", fontSize:12, fontWeight:700, letterSpacing:"0.3em", marginBottom:8}}>KNOCK-OUT</div>
        <h2 className="cond" style={{fontSize:40, fontWeight:900, color:"var(--white)", marginBottom:6}}>{rondeNaam}</h2>
        {wijDoor && ourTeg ? (
          <div style={{margin:"24px 0", padding:"28px 20px", background:"var(--panel)", borderRadius:16, border:"1.5px solid var(--grass)", textAlign:"center", animation:"popIn 0.5s ease"}}>
            <div className="mono" style={{fontSize:11, color:"var(--muted)", letterSpacing:"0.2em", fontWeight:700, marginBottom:16}}>JOUW WEDSTRIJD</div>
            <div style={{display:"flex", alignItems:"center", justifyContent:"center", gap:24}}>
              <div style={{textAlign:"center"}}>
                <Flag team="You FC" size={52}/>
                <div className="cond" style={{fontSize:26, fontWeight:800, color:"var(--white)", marginTop:8}}>JIJ</div>
              </div>
              <div className="cond" style={{fontSize:28, fontWeight:700, color:"var(--muted)"}}>VS</div>
              <div style={{textAlign:"center"}}>
                <Flag team={ourTeg} size={52}/>
                <div className="cond" style={{fontSize:26, fontWeight:800, color:"var(--white)", marginTop:8}}>{ourTeg}</div>
                <div className="mono" style={{fontSize:12, color:"var(--muted)", marginTop:2}}>OVR {berekenSterkte(ourTeg).overall.toFixed(0)}</div>
              </div>
            </div>
          </div>
        ) : (
          <div style={{margin:"24px 0", padding:"20px", background:"var(--panel)", borderRadius:12, border:"1px solid var(--line)", textAlign:"center"}}>
            <div style={{color:"var(--text)"}}>Je bent uitgeschakeld — bekijk hoe de rest van het toernooi verloopt.</div>
          </div>
        )}
        {/* Other matchups preview */}
        <div style={{marginTop:20}}>
          <div className="mono" style={{fontSize:11, color:"var(--muted)", letterSpacing:"0.2em", fontWeight:700, marginBottom:12}}>
            {rondeNaam.toUpperCase()} — ALLE WEDSTRIJDEN
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:8}}>
            {paren.filter(([a,b])=>b!=="Bye").map(([a,b],i)=>{
              const isOurs = a==="Wij"||b==="Wij";
              return (
                <div key={i} style={{display:"flex", alignItems:"center", gap:8, padding:"10px 12px",
                  background: isOurs?"rgba(0,212,106,0.08)":"var(--bg2)", border:`1px solid ${isOurs?"var(--grass)":"var(--line)"}`, borderRadius:8}}>
                  <div className="cond" style={{fontSize:15, fontWeight:700, color:"var(--text)", flex:1, textAlign:"right"}}>{a==="Wij"?"JIJ":a}</div>
                  <div className="mono" style={{fontSize:10, color:"var(--muted)"}}>vs</div>
                  <div className="cond" style={{fontSize:15, fontWeight:700, color:"var(--text)", flex:1}}>{b==="Wij"?"JIJ":b}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{textAlign:"center", marginTop:28}}>
          <Btn onClick={speelRonde}>Speel {rondeNaam.toLowerCase()}</Btn>
        </div>
      </div>
    );
  }

  // RESULTS SCREEN
  if (phase === "results" && rondeResults) {
    const ourResult = rondeResults.find(r => r.isOurs);
    return (
      <div style={{maxWidth:720, margin:"0 auto", padding:"36px 20px 60px", animation:"fadeIn 0.4s ease"}}>
        <div className="mono" style={{color:"var(--grass)", fontSize:12, fontWeight:700, letterSpacing:"0.3em", marginBottom:8}}>{rondeNaam.toUpperCase()} · UITSLAGEN</div>
        {ourResult && (
          <div style={{marginBottom:20}}>
            <ScoreCard homeNaam={ourResult.a==="Wij"?"Jij":ourResult.a} awayNaam={ourResult.b==="Wij"?"Jij":ourResult.b}
              gA={ourResult.gA} gB={ourResult.gB} extra={ourResult.extra}
              penaltyResult={ourResult.penData ? `${ourResult.penData.scoreA}-${ourResult.penData.scoreB}` : ""}
              scorersA={ourResult.scorersA} scorersB={ourResult.scorersB} isOurs highlight/>
          </div>
        )}
        <div className="mono" style={{fontSize:11, color:"var(--muted)", letterSpacing:"0.2em", fontWeight:700, marginBottom:10}}>OVERIGE UITSLAGEN</div>
        {rondeResults.filter(r=>!r.isOurs && !r.bye).map((r,i)=>(
          <div key={i} style={{display:"flex", alignItems:"center", gap:10, padding:"9px 14px", background:"var(--bg2)", border:"1px solid var(--line)", borderRadius:8, marginBottom:6}}>
            <div className="cond" style={{fontSize:15, fontWeight:600, color: r.winnaar===r.a?"var(--white)":"var(--muted)", flex:1, textAlign:"right"}}>{r.a}</div>
            <div className="cond mono" style={{fontSize:15, fontWeight:800, color:"var(--white)", minWidth:44, textAlign:"center"}}>
              {r.gA}-{r.gB}{r.extra==="pen"?"*":""}
            </div>
            <div className="cond" style={{fontSize:15, fontWeight:600, color: r.winnaar===r.b?"var(--white)":"var(--muted)", flex:1}}>{r.b}</div>
          </div>
        ))}
        <div style={{textAlign:"center", marginTop:28}}>
          <Btn onClick={volgendeRonde}>
            {rondeResults.map(r=>r.winnaar).length === 1 ? "Bekijk eindresultaat →" : `Naar ${(RONDES[rondeNr+1]||"volgende ronde").toLowerCase()} →`}
          </Btn>
        </div>
      </div>
    );
  }

  return <div style={{padding:40, textAlign:"center", color:"var(--muted)"}}>Laden...</div>;
}

// PENALTY SHOOTOUT
function PenaltyShootout({ data, onDone }) {
  const { a, b, pen, teg } = data;
  const [revealed, setRevealed] = useState(0);
  const homeNaam = a==="Wij" ? "JIJ" : a;
  const awayNaam = b==="Wij" ? "JIJ" : b;

  useEffect(() => {
    if (revealed < pen.shots.length) {
      const t = setTimeout(() => setRevealed(revealed+1), 850);
      return () => clearTimeout(t);
    }
  }, [revealed, pen.shots.length]);

  const done = revealed >= pen.shots.length;

  return (
    <div style={{maxWidth:560, margin:"0 auto", padding:"40px 20px 60px", animation:"fadeIn 0.4s ease"}}>
      <div style={{textAlign:"center", marginBottom:24}}>
        <div className="mono" style={{color:"var(--gold)", fontSize:12, fontWeight:700, letterSpacing:"0.3em", marginBottom:8, animation:"pulse 1.5s infinite"}}>STRAFSCHOPPEN</div>
        <div style={{display:"flex", alignItems:"center", justifyContent:"center", gap:20}}>
          <div className="cond" style={{fontSize:24, fontWeight:800, color:"var(--white)"}}>{homeNaam}</div>
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <span className="cond" style={{fontSize:44, fontWeight:900, color:"var(--grass)"}}>{done?pen.scoreA:"–"}</span>
            <span className="cond" style={{fontSize:24, color:"var(--muted)"}}>:</span>
            <span className="cond" style={{fontSize:44, fontWeight:900, color:"var(--grass)"}}>{done?pen.scoreB:"–"}</span>
          </div>
          <div className="cond" style={{fontSize:24, fontWeight:800, color:"var(--white)"}}>{awayNaam}</div>
        </div>
      </div>

      <div style={{background:"var(--panel)", border:"1px solid var(--line)", borderRadius:14, overflow:"hidden"}}>
        <div style={{display:"flex", padding:"10px 16px", borderBottom:"1px solid var(--line)", background:"var(--bg2)"}}>
          <div className="cond" style={{flex:1, fontSize:15, fontWeight:700, color:"var(--text)", textAlign:"right"}}>{homeNaam}</div>
          <div style={{width:60}}/>
          <div className="cond" style={{flex:1, fontSize:15, fontWeight:700, color:"var(--text)"}}>{awayNaam}</div>
        </div>
        {pen.shots.slice(0, revealed).map((shot,i)=>(
          <div key={i} style={{display:"flex", alignItems:"center", padding:"10px 16px",
            borderBottom: i<revealed-1?"1px solid var(--line)":"none", animation:"slideInLeft 0.3s ease"}}>
            <div style={{flex:1, display:"flex", alignItems:"center", justifyContent:"flex-end", gap:8}}>
              <span style={{fontSize:12, color:"var(--text)", fontWeight:500}}>{shot.a.naam}</span>
              <span style={{fontSize:18}}>{shot.a.goal ? "⚽" : "❌"}</span>
            </div>
            <div className="mono" style={{width:60, textAlign:"center", fontSize:11, fontWeight:700, color: shot.sd?"var(--gold)":"var(--muted)"}}>
              {shot.sd ? `SD${shot.round}` : shot.round}
            </div>
            <div style={{flex:1, display:"flex", alignItems:"center", gap:8}}>
              <span style={{fontSize:18}}>{shot.b.goal ? "⚽" : "❌"}</span>
              <span style={{fontSize:12, color:"var(--text)", fontWeight:500}}>{shot.b.naam}</span>
            </div>
          </div>
        ))}
      </div>

      {done && (
        <div style={{textAlign:"center", marginTop:24, animation:"popIn 0.5s ease"}}>
          <div className="cond" style={{fontSize:26, fontWeight:900, color: pen.aWint===(a==="Wij")?"var(--grass)":"var(--red)", marginBottom:16}}>
            {(pen.aWint ? homeNaam : awayNaam)} wint de strafschoppenreeks
          </div>
          <Btn onClick={onDone}>Verder</Btn>
        </div>
      )}
    </div>
  );
}

// SCREEN: FINISH (champion or eliminated)

            <h1 className="cond" style={{fontSize:"clamp(44px, 10vw, 76px)", fontWeight:900, color:"var(--white)", lineHeight:0.9, marginBottom:16}}>
              JE HEBT DE<br/><span style={{color:"var(--gold)"}}>WERELDBEKER</span><br/>GEWONNEN

            <div style={{fontSize:72, marginBottom:16}}>😞</div>

            <h1 className="cond" style={{fontSize:"clamp(36px, 8vw, 60px)", fontWeight:900, color:"var(--white)", lineHeight:0.95, marginBottom:12}}>
              EINDE IN DE<br/><span style={{color:"var(--red)"}}>{(uitschakelRonde||"groepsfase").toUpperCase()}</span>
            </h1>
            <div style={{color:"var(--text)", fontSize:16, marginBottom:8}}>

        <div style={{display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap"}}>

          <Btn onClick={onScoreboard} variant="ghost">Scorebord</Btn>
        </div>
      </div>
    </div>
  );
}

function Confetti() {
  const pieces = useMemo(() => Array.from({length:60}, (_,i) => ({
    id:i, left: Math.random()*100, delay: Math.random()*2, dur: 2.5+Math.random()*2,
    color: ["#FFB627","#00D46A","#F5F8FF","#FF3B5C","#5DD9C1"][Math.floor(Math.random()*5)],
    size: 6+Math.random()*8,
  })), []);
  return (
    <div style={{position:"absolute", inset:0, pointerEvents:"none", zIndex:1}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute", left:`${p.left}%`, top:0, width:p.size, height:p.size*0.6,
          background:p.color, animation:`confetti ${p.dur}s linear ${p.delay}s infinite`, borderRadius:2}}/>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SCREEN: SCOREBOARD
// ═══════════════════════════════════════════════════════════════════
function Scoreboard({ onBack }) {
  const [players, setPlayers] = useState(null);
  const [sortBy, setSortBy] = useState("championships");

  useEffect(() => { loadScoreboard().then(setPlayers); }, []);

  const sorted = useMemo(() => {
    if (!players) return [];
    const withAvg = players.map(p => ({...p, avgRating: p.games>0 ? p.totalRating/p.games : 0}));
    return withAvg.sort((a,b) => {
      if (sortBy === "championships") return b.championships - a.championships || b.avgRating - a.avgRating;
      if (sortBy === "avgRating") return b.avgRating - a.avgRating;
      if (sortBy === "goals") return b.goals - a.goals;
      return 0;
    });
  }, [players, sortBy]);

  return (
    <div style={{maxWidth:760, margin:"0 auto", padding:"40px 20px 60px", animation:"fadeUp 0.5s ease"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
        <div className="mono" style={{color:"var(--grass)", fontSize:12, fontWeight:700, letterSpacing:"0.3em"}}>WERELDRANGLIJST</div>
        <button onClick={onBack} className="cond" style={{background:"none", border:"none", color:"var(--muted)", cursor:"pointer", fontSize:15, fontWeight:700}}>← TERUG</button>
      </div>
      <h2 className="cond" style={{fontSize:44, fontWeight:900, color:"var(--white)", marginBottom:20}}>Scorebord</h2>

      <div style={{display:"flex", gap:8, marginBottom:20, flexWrap:"wrap"}}>
        {[["championships","Titels"],["avgRating","Gem. rating"],["goals","Doelpunten"]].map(([k,label])=>(
          <button key={k} onClick={()=>setSortBy(k)} className="cond" style={{
            padding:"8px 18px", borderRadius:8, fontSize:15, fontWeight:700, cursor:"pointer", transition:"all 0.15s",
            background: sortBy===k?"var(--grass)":"var(--panel)", color: sortBy===k?"#03260F":"var(--text)",
            border:`1.5px solid ${sortBy===k?"var(--grass)":"var(--line)"}`, textTransform:"uppercase", letterSpacing:"0.03em"}}>
            {label}
          </button>
        ))}
      </div>

      {players === null ? (
        <div style={{textAlign:"center", padding:40, color:"var(--muted)"}}>Laden...</div>
      ) : sorted.length === 0 ? (
        <div style={{textAlign:"center", padding:"48px 20px", background:"var(--panel)", borderRadius:14, border:"1px solid var(--line)"}}>
          <div style={{fontSize:40, marginBottom:12}}>⚽</div>
          <div className="cond" style={{fontSize:22, fontWeight:700, color:"var(--white)", marginBottom:6}}>Nog geen resultaten</div>
          <div style={{color:"var(--text)", fontSize:15}}>Speel een toernooi om op het scorebord te komen.</div>
        </div>
      ) : (
        <div style={{background:"var(--bg2)", border:"1px solid var(--line)", borderRadius:14, overflow:"hidden"}}>
          <div style={{display:"flex", padding:"12px 16px", borderBottom:"1px solid var(--line)", background:"var(--panel)"}}>
            <div className="mono" style={{width:32, fontSize:10, color:"var(--muted)", fontWeight:700}}>#</div>
            <div className="mono" style={{flex:1, fontSize:10, color:"var(--muted)", fontWeight:700, letterSpacing:"0.1em"}}>SPELER</div>
            <div className="mono" style={{width:52, fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center"}}>🏆</div>
            <div className="mono" style={{width:60, fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center"}}>RATING</div>
            <div className="mono" style={{width:48, fontSize:10, color:"var(--muted)", fontWeight:700, textAlign:"center"}}>⚽</div>
          </div>
          {sorted.map((p,i)=>(
            <div key={i} style={{display:"flex", alignItems:"center", padding:"12px 16px",
              borderBottom: i<sorted.length-1?"1px solid var(--line)":"none",
              background: i===0 && sortBy==="championships" && p.championships>0 ? "rgba(255,182,39,0.06)":"transparent"}}>
              <div className="cond" style={{width:32, fontSize:18, fontWeight:800, color: i===0?"var(--gold)":i<3?"var(--grass)":"var(--muted)"}}>{i+1}</div>
              <div style={{flex:1}}>
                <div className="cond" style={{fontSize:19, fontWeight:700, color:"var(--white)"}}>{p.naam}</div>
                <div className="mono" style={{fontSize:10, color:"var(--muted)"}}>{p.games} {p.games===1?"potje":"potjes"}</div>
              </div>
              <div className="cond" style={{width:52, fontSize:22, fontWeight:900, color: p.championships>0?"var(--gold)":"var(--muted)", textAlign:"center"}}>{p.championships}</div>
              <div className="cond" style={{width:60, fontSize:20, fontWeight:800, color:ratingColor(p.avgRating), textAlign:"center"}}>{p.avgRating.toFixed(1)}</div>
              <div className="cond" style={{width:48, fontSize:20, fontWeight:800, color:"var(--text)", textAlign:"center"}}>{p.goals}</div>
            </div>
          ))}
        </div>
      )}
      <div className="mono" style={{textAlign:"center", marginTop:20, fontSize:11, color:"var(--muted)"}}>
        {jsonbinKlaar()
          ? "Gedeeld scorebord — resultaten van alle spelers van deze link."
          : "Lokaal scorebord — alleen zichtbaar in deze browser. Stel JSONBin in om te delen."}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState("start"); // start | formation | draft | overview | group | knockout | finish | scoreboard
  const [naam, setNaam] = useState("");
  const [loading, setLoading] = useState(false);
  const [formation, setFormation] = useState(null);
  const [gevuld, setGevuld] = useState(null);
  const [onzeSterkte, setOnzeSterkte] = useState(null);
  const [teamRating, setTeamRating] = useState(0);
  const [onzePos, setOnzePos] = useState(null);
  const [poulegenoten, setPoulegenoten] = useState(null);
  const [goals, setGoals] = useState(0);
  const [finishData, setFinishData] = useState(null);
  const [prevScreen, setPrevScreen] = useState("start");
  const goalsRef = useRef(0);

  function startGame() {
    setLoading(true);
    // Precompute group probabilities (heavy). Defer so button shows loading.
    setTimeout(() => {
      ensureGroepskanssen();
      setLoading(false);
      setGoals(0); goalsRef.current = 0;
      setScreen("formation");
    }, 50);
  }

  function pickFormation(f) { setFormation(f); setScreen("draft"); }

  function draftComplete(g) { setGevuld(g); setScreen("overview"); }

  function overviewContinue(g, sterkte, avgRating) {
    setOnzeSterkte(sterkte); setTeamRating(avgRating); setScreen("group");
  }

  function addGoals(n) { goalsRef.current += n; setGoals(goalsRef.current); }

  function groupComplete(pos, gekwal, poule, groupGoals) {
    goalsRef.current += groupGoals; setGoals(goalsRef.current);
    setOnzePos(pos); setPoulegenoten(poule);
    if (gekwal) {
      setScreen("knockout");
    } else {
      finishGame("group-out", "groepsfase");
    }
  }

  async function knockoutFinish(kampioen, uitschakelRonde) {
    finishGame(kampioen, uitschakelRonde);
  }

  async function finishGame(kampioen, uitschakelRonde) {
    const isChamp = kampioen === "Wij";
    setFinishData({ kampioen, uitschakelRonde });
    // Save to scoreboard
    if (naam.trim()) {
      await saveResult(naam, teamRating, goalsRef.current, isChamp);
    }
    setScreen("finish");
  }

  function goScoreboard() { setPrevScreen(screen); setScreen("scoreboard"); }
  function backFromScoreboard() { setScreen(prevScreen === "scoreboard" ? "start" : prevScreen); }

  function replay() {
    setFormation(null); setGevuld(null); setOnzeSterkte(null);
    setTeamRating(0); setOnzePos(null); setPoulegenoten(null);
    setGoals(0); goalsRef.current = 0; setFinishData(null);
    setScreen("formation");
  }

  return (
    <>
      {screen === "start" && <StartScreen naam={naam} setNaam={setNaam} onStart={startGame} onScoreboard={goScoreboard} loading={loading}/>}
      {screen === "formation" && <FormationScreen onPick={pickFormation}/>}
      {screen === "draft" && <DraftScreen formation={formation} onComplete={draftComplete}/>}
      {screen === "overview" && <SquadOverview gevuld={gevuld} slots={FORMATIES[formation]} formation={formation} onContinue={overviewContinue}/>}
      {screen === "group" && <GroupStage onzeSpelers={gevuld} onzeSterkte={onzeSterkte} onComplete={groupComplete}/>}
      {screen === "knockout" && <Knockout onzeSpelers={gevuld} onzeSterkte={onzeSterkte} onzePos={onzePos} poulegenoten={poulegenoten} onFinish={knockoutFinish} addGoals={addGoals}/>}
      {screen === "finish" && <FinishScreen kampioen={finishData.kampioen} uitschakelRonde={finishData.uitschakelRonde} teamRating={teamRating} goals={goals} onScoreboard={goScoreboard} onReplay={replay}/>}
      {screen === "scoreboard" && <Scoreboard onBack={backFromScoreboard}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
